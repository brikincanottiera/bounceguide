<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--bg2:#181818;--bg3:#222;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--t1:#efefef;--t2:#888;--t3:#444;--acc:#E8C547;--acc-dim:rgba(232,197,71,0.12);--radius:10px;--radius-sm:6px}
html{background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.6}
body{min-height:100vh;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(15,15,15,0.96);backdrop-filter:blur(16px)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:28px;height:28px;border-radius:6px;background:var(--acc);display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:16px;height:16px}
.logo-text{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-0.4px}
.lang-switcher{display:flex;gap:4px}
.lang-btn{padding:4px 9px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:transparent;color:var(--t2);font-size:11px;cursor:pointer;transition:all 0.15s;font-weight:500;text-transform:uppercase}
.lang-btn:hover{border-color:var(--border2);color:var(--t1)}
.lang-btn.active{background:var(--acc-dim);border-color:var(--acc);color:var(--acc)}
main{flex:1;max-width:720px;margin:0 auto;padding:48px 24px 80px;width:100%}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--t2);text-decoration:none;margin-bottom:32px;transition:color 0.15s}
.back-link:hover{color:var(--acc)}
.legal-title{font-size:28px;font-weight:800;color:var(--t1);letter-spacing:-0.6px;margin-bottom:6px}
.legal-updated{font-size:12px;color:var(--t3);margin-bottom:8px}
.legal-intro{font-size:14px;color:var(--t2);line-height:1.75;margin-bottom:32px;padding-bottom:24px;border-bottom:0.5px solid var(--border)}
.legal-section{margin-bottom:28px}
.legal-s-title{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:8px}
.legal-s-text{font-size:13px;color:var(--t2);line-height:1.75}
footer{padding:20px 32px;border-top:0.5px solid var(--border);background:var(--bg)}
.footer-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
.footer-left{font-size:12px;color:var(--t2)}
.footer-links{display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.footer-links a{font-size:12px;font-weight:600;color:var(--t2);text-decoration:none;transition:color 0.15s}
.footer-links a:hover{color:var(--acc)}
.footer-links .legal-link{font-weight:400;color:var(--t3)}
.footer-links .legal-link:hover{color:var(--t2)}
@media(max-width:600px){header{padding:12px 16px}main{padding:28px 16px 60px}footer{padding:14px 16px}}

@media(max-width:640px){
  .header-nav-links{display:none !important}
  .lang-switcher{display:none !important}
  .lang-select-mobile{display:flex !important}
}
@media(min-width:641px){
  .lang-select-mobile{display:none !important}
}
</style>

ide"}, "it": {"title": "Privacy Policy", "updated": "Ultimo aggiornamento: Aprile 2026", "intro": "Questa Privacy Policy descrive come BounceGuide (bounceguide.vercel.app) gestisce i tuoi dati personali. BounceGuide e uno strumento gratuito gestito da Francesco (Brik in Canottiera).", "s1title": "Quali dati raccogliamo", "s1text": "BounceGuide non raccoglie alcun dato personale durante il normale utilizzo dell'app. La guida PDF viene generata interamente nel tuo browser, nessun dato viene inviato a nessun server. L'unico dato personale che raccogliamo e il tuo indirizzo email, che puoi facoltativamente fornire quando invii una richiesta di funzionalita.", "s2title": "Come utilizziamo i tuoi dati", "s2text": "Il tuo indirizzo email, se fornito, viene utilizzato esclusivamente per notificarti se la tua richiesta viene implementata. Non verra mai utilizzato per marketing, condiviso con terze parti o usato per qualsiasi altro scopo.", "s3title": "Dove vengono conservati i tuoi dati", "s3text": "Le richieste di funzionalita e gli indirizzi email associati sono conservati in un database Notion privato accessibile solo all'operatore di BounceGuide. Notion e un servizio di terze parti con la propria privacy policy disponibile su notion.so/privacy.", "s4title": "Per quanto tempo conserviamo i tuoi dati", "s4text": "I tuoi dati vengono conservati per il tempo necessario a valutare la tua richiesta. Puoi richiedere la cancellazione in qualsiasi momento contattandoci all'email indicata sotto.", "s5title": "I tuoi diritti (GDPR)", "s5text": "Se sei residente nello Spazio Economico Europeo, hai il diritto di accedere, correggere o cancellare i tuoi dati personali in qualsiasi momento. Per esercitare questi diritti, contatta francescobrik@gmail.com. Risponderemo entro 30 giorni.", "s6title": "Cookie", "s6text": "BounceGuide non utilizza cookie di tracciamento ne cookie di analytics di terze parti. Utilizziamo il localStorage del tuo browser solo per salvare i progressi del form e la preferenza di lingua, questi dati non lasciano mai il tuo dispositivo.", "s7title": "Contatti", "s7text": "Per qualsiasi domanda sulla privacy o richiesta di cancellazione dei dati, contatta: francescobrik@gmail.com", "back": "Torna a BounceGuide"}, "es": {"title": "Politica de Privacidad", "updated": "Ultima actualizacion: Abril 2026", "intro": "Esta Politica de Privacidad describe como BounceGuide (bounceguide.vercel.app) maneja tus datos personales. BounceGuide es una herramienta gratuita operada por Francesco (Brik in Canottiera).", "s1title": "Que datos recopilamos", "s1text": "BounceGuide no recopila ningun dato personal durante el uso normal de la aplicacion. La guia PDF se genera completamente en tu navegador, ningun dato se envia a ningun servidor. El unico dato personal que recopilamos es tu direccion de email, que puedes proporcionar opcionalmente al enviar una solicitud de funcion.", "s2title": "Como usamos tus datos", "s2text": "Tu direccion de email, si se proporciona, se usa exclusivamente para notificarte si tu solicitud es implementada. Nunca sera usada para marketing, compartida con terceros ni usada para ningun otro proposito.", "s3title": "Donde se almacenan tus datos", "s3text": "Las solicitudes de funciones y las direcciones de email asociadas se almacenan en una base de datos privada de Notion accesible solo al operador de BounceGuide. Notion es un servicio de terceros con su propia politica de privacidad disponible en notion.so/privacy.", "s4title": "Cuanto tiempo conservamos tus datos", "s4text": "Tus datos se conservan durante el tiempo necesario para evaluar tu solicitud. Puedes solicitar la eliminacion en cualquier momento contactandonos al email indicado.", "s5title": "Tus derechos (RGPD)", "s5text": "Si resides en el Espacio Economico Europeo, tienes derecho a acceder, corregir o eliminar tus datos personales en cualquier momento. Para ejercer estos derechos, contacta francescobrik@gmail.com. Responderemos en 30 dias.", "s6title": "Cookies", "s6text": "BounceGuide no usa cookies de seguimiento ni cookies de analitica de terceros. Usamos localStorage en tu navegador solo para guardar el progreso del formulario y la preferencia de idioma, estos datos nunca salen de tu dispositivo.", "s7title": "Contacto", "s7text": "Para cualquier pregunta sobre privacidad o solicitud de eliminacion de datos, contacta: francescobrik@gmail.com", "back": "Volver a BounceGuide"}, "fr": {"title": "Politique de Confidentialite", "updated": "Derniere mise a jour: Avril 2026", "intro": "Cette Politique de Confidentialite decrit comment BounceGuide (bounceguide.vercel.app) traite tes donnees personnelles. BounceGuide est un outil gratuit exploite par Francesco (Brik in Canottiera).", "s1title": "Quelles donnees nous collectons", "s1text": "BounceGuide ne collecte aucune donnee personnelle lors de l'utilisation normale de l'application. Le guide PDF est entierement genere dans ton navigateur, aucune donnee n'est envoyee a un serveur. La seule donnee personnelle que nous collectons est ton adresse email, que tu peux fournir optionnellement lors de l'envoi d'une demande de fonctionnalite.", "s2title": "Comment nous utilisons tes donnees", "s2text": "Ton adresse email, si fournie, est utilisee exclusivement pour te notifier si ta demande est implementee. Elle ne sera jamais utilisee a des fins marketing, partagee avec des tiers ou utilisee a d'autres fins.", "s3title": "Ou tes donnees sont stockees", "s3text": "Les demandes de fonctionnalites et les adresses email associees sont stockees dans une base de donnees Notion privee accessible uniquement a l'operateur de BounceGuide. Notion est un service tiers avec sa propre politique de confidentialite disponible sur notion.so/privacy.", "s4title": "Combien de temps nous conservons tes donnees", "s4text": "Tes donnees sont conservees le temps necessaire pour evaluer ta demande. Tu peux demander leur suppression a tout moment en nous contactant a l'email indique.", "s5title": "Tes e lange wir deine Daten aufbewahren", "s4text": "Deine Daten werden so lange aufbewahrt wie notig um deine Anfrage zu bewerten. Du kannst jederzeit die Loschung beantragen indem du uns an die unten angegebene E-Mail kontaktierst.", "s5title": "Deine Rechte (DSGVO)", "s5text": "Wenn du im Europaischen Wirtschaftsraum ansassig bist hast du das Recht jederzeit auf deine personlichen Daten zuzugreifen sie zu korrigieren oder zu loschen. Um diese Rechte auszuuben kontaktiere francescobrik@gmail.com. Wir antworten innerhalb von 30 Tagen.", "s6title": "Cookies", "s6text": "BounceGuide verwendet keine Tracking-Cookies oder Analyse-Cookies von Drittanbietern. Wir verwenden localStorage in deinem Browser nur um deinen Formularfortschritt und deine Spracheinstellung zu speichern, diese Daten verlassen niemals dein Gerat.", "s7title": "Kontakt", "s7text": "Fur Fragen zum Datenschutz oder Loschungsanfragen kontaktiere: francescobrik@gmail.com", "back": "Zuruck zu BounceGuide"}, "pt": {"title": "Politica de Privacidade", "updated": "Ultima atualizacao: Abril 2026", "intro": "Esta Politica de Privacidade descreve como o BounceGuide (bounceguide.vercel.app) trata seus dados pessoais. BounceGuide e uma ferramenta gratuita operada por Francesco (Brik in Canottiera).", "s1title": "Quais dados coletamos", "s1text": "O BounceGuide nao coleta nenhum dado pessoal durante o uso normal do aplicativo. O guia PDF e gerado inteiramente no seu navegador, nenhum dado e enviado a nenhum servidor. O unico dado pessoal que coletamos e seu endereco de email, que voce pode fornecer opcionalmente ao enviar uma solicitacao de funcionalidade.", "s2title": "Como usamos seus dados", "s2text": "Seu endereco de email, se fornecido, e usado exclusivamente para notifica-lo se sua solicitacao for implementada. Nunca sera usado para marketing, compartilhado com terceiros ou usado para qualquer outro fim.", "s3title": "Onde seus dados sao armazenados", "s3text": "As solicitacoes de funcionalidades e os enderecos let lang = 'en';
const IDS = ["title", "updated", "intro", "s1title", "s2title", "s3title", "s4title", "s5title", "s6title", "s7title", "s1text", "s2text", "s3text", "s4text", "s5text", "s6text", "s7text", "back"];
function setLang(l) {
  lang = l;
  try{localStorage.setItem('bg_lang',l);}catch(e){}
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  const sel=document.querySelector('.lang-select-mobile');if(sel)sel.value=l;
  const tr = T[l] || T.en;
  IDS.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = tr[id] || '';
  });
  document.title = (tr.title || 'BounceGuide') + ', BounceGuide';
}
document.addEventListener('DOMContentLoaded', () => {
  try{const sl=localStorage.getItem('bg_lang');if(sl)lang=sl;}catch(e){}
  setLang(lang);
});
