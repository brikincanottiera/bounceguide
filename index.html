<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BounceGuide</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#181818;--bg3:#222;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --t1:#efefef;--t2:#888;--t3:#444;
  --acc:#E8C547;--acc-dim:rgba(232,197,71,0.12);
  --info-bg:rgba(59,130,246,0.08);--info-border:rgba(59,130,246,0.2);--info-text:#93c5fd;
  --warn-bg:rgba(239,68,68,0.08);--warn-border:rgba(239,68,68,0.25);--warn-text:#fca5a5;
  --radius:10px;--radius-sm:6px;
}
html{background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.6}
body{min-height:100vh;display:flex;flex-direction:column}

header{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(15,15,15,0.96);backdrop-filter:blur(16px)}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:28px;height:28px;border-radius:6px;background:var(--acc);display:flex;align-items:center;justify-content:center;transition:background 0.3s}
.logo-mark svg{width:16px;height:16px}
.logo-text{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-0.4px}
.lang-switcher{display:flex;gap:4px}
.lang-btn{padding:4px 9px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:transparent;color:var(--t2);font-size:11px;cursor:pointer;transition:all 0.15s;font-weight:500;text-transform:uppercase}
.lang-btn:hover{border-color:var(--border2);color:var(--t1)}
.lang-btn.active{background:var(--acc-dim);border-color:var(--acc);color:var(--acc)}
.about-nav-link{font-size:12px;font-weight:600;color:var(--t2);text-decoration:none;letter-spacing:0.3px;transition:color 0.15s;padding:4px 0}
.about-nav-link:hover{color:var(--t1)}
.header-sep{width:0.5px;height:16px;background:var(--border2)}

.hero{padding:32px 32px 24px;border-bottom:0.5px solid var(--border)}
.hero-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--acc);margin-bottom:10px;font-weight:600}
.hero-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--acc)}
.hero h1{font-size:22px;font-weight:800;color:var(--t1);letter-spacing:-0.5px;line-height:1.25;margin-bottom:7px}
.hero h1 span{color:var(--acc)}
.hero-desc{font-size:13px;color:var(--t2);max-width:500px;line-height:1.7;margin-bottom:12px}
.hero-features{display:flex;gap:14px;flex-wrap:wrap}
.hero-feat{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2)}
.hero-feat::before{content:'✓';color:var(--acc);font-weight:700}

.progress-wrap{padding:9px 32px;border-bottom:0.5px solid var(--border)}
.progress-label{font-size:10px;color:var(--t2);margin-bottom:4px;display:flex;justify-content:space-between}
.progress-bar-bg{height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--acc);border-radius:2px;transition:width 0.4s ease}

main{flex:1;display:grid;grid-template-columns:256px 1fr;align-items:start}
.sidebar{padding:14px;border-right:0.5px solid var(--border);position:sticky;top:57px;max-height:calc(100vh - 96px);overflow-y:auto}
.form-area{padding:22px 30px 48px}

.steps-nav{display:flex;flex-direction:column;gap:2px;margin-bottom:12px}
.step-btn{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--t2);font-size:11px;cursor:pointer;transition:all 0.15s;text-align:left;width:100%;font-family:inherit}
.step-btn:hover{background:var(--bg3);color:var(--t1)}
.step-btn.active{background:var(--acc-dim);color:var(--acc)}
.step-btn.done{color:var(--t1)}
.step-num{width:18px;height:18px;border-radius:50%;border:0.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.step-btn.done .step-num{background:var(--acc);border-color:var(--acc);color:#000}

.sidebar-sep{height:0.5px;background:var(--border);margin:10px 0}
.tone-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:5px}
.tone-btns{display:flex;gap:4px;margin-bottom:10px}
.tone-btn{flex:1;padding:5px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:transparent;color:var(--t2);font-size:11px;cursor:pointer;font-family:inherit;transition:all 0.15s}
.tone-btn.active{background:var(--acc-dim);border-color:var(--acc);color:var(--acc)}

.gen-btn{width:100%;padding:10px;border-radius:var(--radius-sm);border:none;background:var(--acc);color:#000;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:6px;transition:opacity 0.15s}
.gen-btn:hover{opacity:0.87}
.gen-btn:disabled{opacity:0.3;cursor:not-allowed}
.reset-btn{width:100%;padding:7px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:transparent;color:var(--t3);font-size:11px;cursor:pointer;font-family:inherit;transition:all 0.15s}
.reset-btn:hover{color:var(--warn-text);border-color:var(--warn-border)}

.form-section{display:none}
.form-section.active{display:block;animation:fadeIn 0.18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.section-title{font-size:18px;font-weight:800;color:var(--t1);margin-bottom:4px;letter-spacing:-0.4px}
.section-desc{font-size:13px;color:var(--t2);margin-bottom:16px;line-height:1.7}
.sub-label{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px;margin-top:4px}
.divider{height:0.5px;background:var(--border);margin:16px 0}

.info-box{padding:10px 13px;border-radius:var(--radius-sm);background:var(--info-bg);border:0.5px solid var(--info-border);margin-bottom:11px}
.info-box-title{font-size:10px;font-weight:700;color:var(--info-text);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.info-box p{font-size:12px;color:var(--info-text);line-height:1.6;opacity:0.9}

.field-group{margin-bottom:12px}
label.field-label{display:block;font-size:11px;font-weight:600;color:var(--t2);letter-spacing:0.4px;text-transform:uppercase;margin-bottom:5px}
input[type=text],input[type=email],input[type=url],textarea{width:100%;padding:8px 11px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg2);color:var(--t1);font-size:13px;font-family:inherit;outline:none;transition:border-color 0.15s;resize:vertical}
input:focus,textarea:focus{border-color:var(--acc)}
textarea{min-height:68px}
input::placeholder,textarea::placeholder{color:var(--t3)}
input[type=color]{width:38px;height:32px;padding:2px 3px;cursor:pointer;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg2)}

.radio-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.radio-item{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg2);cursor:pointer;transition:all 0.15s;user-select:none}
.radio-item:hover{border-color:var(--border2)}
.radio-item.selected{border-color:var(--acc);background:var(--acc-dim)}
.radio-dot{width:14px;height:14px;border-radius:50%;border:0.5px solid var(--border2);background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;margin-top:2px}
.radio-item.selected .radio-dot{border-color:var(--acc)}
.radio-dot::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--acc);opacity:0;transition:opacity 0.15s}
.radio-item.selected .radio-dot::after{opacity:1}
.radio-label{font-size:12px;color:var(--t1);font-weight:500;line-height:1.4}
.radio-sub{font-size:11px;color:var(--t2);margin-top:2px;line-height:1.4}

.service-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.service-card{padding:16px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg2);cursor:pointer;transition:all 0.15s;user-select:none}
.service-card:hover{border-color:var(--border2)}
.service-card.selected{border-color:var(--acc);background:var(--acc-dim)}
.service-card-icon{font-size:24px;margin-bottom:7px}
.service-card-title{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:3px}
.service-card-desc{font-size:11px;color:var(--t2);line-height:1.5}

.check-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.check-grid2{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg2);cursor:pointer;transition:all 0.15s;user-select:none}
.check-item:hover{border-color:var(--border2)}
.check-item.checked{border-color:var(--acc);background:var(--acc-dim)}
.check-box{width:15px;height:15px;border-radius:4px;border:0.5px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all 0.15s}
.check-item.checked .check-box{background:var(--acc);border-color:var(--acc)}
.check-box svg{width:9px;height:9px;opacity:0;transition:opacity 0.15s}
.check-item.checked .check-box svg{opacity:1}
.check-label{font-size:12px;color:var(--t1);font-weight:500;line-height:1.4}
.check-sub{font-size:11px;color:var(--t2);margin-top:3px;line-height:1.4}

.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg2);margin-bottom:12px;cursor:pointer;user-select:none;transition:all 0.15s}
.toggle-row:hover{border-color:var(--border2)}
.toggle-row.on{border-color:var(--acc);background:var(--acc-dim)}
.toggle-info .toggle-title{font-size:13px;font-weight:600;color:var(--t1)}
.toggle-info .toggle-sub{font-size:11px;color:var(--t2);margin-top:2px}
.toggle-switch{width:32px;height:17px;border-radius:9px;background:var(--t3);position:relative;flex-shrink:0;transition:background 0.2s;margin-left:12px}
.toggle-row.on .toggle-switch{background:var(--acc)}
.toggle-switch::after{content:'';position:absolute;width:11px;height:11px;border-radius:50%;background:white;top:3px;left:3px;transition:left 0.2s}
.toggle-row.on .toggle-switch::after{left:18px}

.other-reveal{display:none;margin-top:6px;padding:9px 11px;background:var(--bg3);border-radius:var(--radius-sm);border:0.5px solid var(--border2)}
.other-reveal.visible{display:block}

.multi-other-list{display:flex;flex-direction:column;gap:6px;margin-top:7px}
.multi-other-item{padding:9px 11px;background:var(--bg3);border-radius:var(--radius-sm);border:0.5px solid var(--border);display:flex;gap:7px;align-items:flex-start}
.multi-other-item .fields{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px}
.multi-other-item input,.multi-other-item textarea{width:100%}
.multi-other-item textarea{min-height:46px}
.remove-btn{padding:4px 7px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:transparent;color:var(--t2);cursor:pointer;font-size:11px;flex-shrink:0;margin-top:3px;transition:all 0.15s}
.remove-btn:hover{color:var(--warn-text);border-color:var(--warn-border)}
.add-other-btn{padding:6px 12px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:transparent;color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.15s;margin-top:6px;display:inline-block}
.add-other-btn:hover{color:var(--t1);border-color:var(--acc);background:var(--acc-dim)}

/* DAW GRID */
.daw-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
.daw-card{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 5px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg2);cursor:pointer;transition:all 0.15s;user-select:none;text-align:center}
.daw-card:hover{border-color:var(--border2)}
.daw-card.selected{border-color:var(--acc);background:var(--acc-dim)}
.daw-icon{font-size:18px}
.daw-name{font-size:10px;font-weight:600;color:var(--t1);line-height:1.2}

/* DAW CONFIRM CARDS */
.daw-confirm-section{display:flex;flex-direction:column;gap:14px;margin-top:14px}
.daw-confirm-card{border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);overflow:hidden}
.daw-confirm-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg3);border-bottom:0.5px solid var(--border)}
.daw-confirm-header-left{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--t1)}
.daw-confirmed-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;background:rgba(34,197,94,0.15);border:0.5px solid rgba(34,197,94,0.3);color:#86efac;font-size:10px;font-weight:700}
.daw-steps-preview{padding:12px 14px;border-bottom:0.5px solid var(--border)}
.daw-step-row{display:flex;gap:8px;margin-bottom:5px;font-size:12px;color:var(--t1);line-height:1.5}
.daw-step-num{font-size:10px;font-weight:700;color:var(--acc);flex-shrink:0;width:16px;padding-top:1px}
.daw-yt-section{padding:10px 14px;border-bottom:0.5px solid var(--border)}
.daw-yt-label{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:5px}
.daw-confirm-question{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.daw-confirm-q-text{font-size:12px;color:var(--t2)}
.daw-confirm-btns{display:flex;gap:6px}
.daw-yes-btn,.daw-no-btn{padding:6px 14px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:transparent;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.daw-yes-btn{color:var(--t2)}
.daw-yes-btn:hover,.daw-yes-btn.active{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.4);color:#86efac}
.daw-no-btn{color:var(--t2)}
.daw-no-btn:hover,.daw-no-btn.active{background:var(--warn-bg);border-color:var(--warn-border);color:var(--warn-text)}
.daw-edit-area{padding:10px 14px;border-top:0.5px solid var(--border)}
.daw-edit-area textarea{min-height:120px;font-family:'SF Mono','Fira Mono',monospace;font-size:11px;line-height:1.6}
.daw-edit-confirm-btn{margin-top:6px;padding:7px 14px;border-radius:var(--radius-sm);border:none;background:var(--acc);color:#000;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

/* CONTINUE 8 LOCKED */
.continue-locked-note{font-size:11px;color:var(--t2);margin-top:8px;opacity:0.7}

.logo-upload{border:0.5px dashed var(--border2);border-radius:var(--radius-sm);padding:14px;text-align:center;cursor:pointer;transition:all 0.15s;margin-bottom:9px}
.logo-upload:hover{border-color:var(--acc);background:var(--acc-dim)}
.logo-preview{max-height:44px;max-width:160px;margin:5px auto 0;display:block}

.checklist-preview{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.checklist-preview-item{display:flex;align-items:center;gap:9px;padding:7px 11px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg2)}
.cl-dot{width:15px;height:15px;border-radius:50%;border:0.5px solid var(--acc);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:var(--acc);font-weight:700}
.cl-text{font-size:12px;color:var(--t1)}

.stupidity-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:var(--acc-dim);border:0.5px solid var(--acc);color:var(--acc);font-size:10px;font-weight:700;margin-left:7px}

.nav-btns{display:flex;gap:9px;margin-top:20px;padding-top:16px;border-top:0.5px solid var(--border)}
.btn-back{padding:8px 16px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:transparent;color:var(--t2);font-size:13px;cursor:pointer;font-family:inherit;transition:all 0.15s}
.btn-back:hover{color:var(--t1);border-color:var(--t1)}
.btn-next{padding:8px 18px;border-radius:var(--radius-sm);border:none;background:var(--acc);color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity 0.15s}
.btn-next:hover{opacity:0.85}
.btn-next:disabled{opacity:0.3;cursor:not-allowed}

footer{padding:11px 32px;border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.footer-l,.footer-r{font-size:11px;color:var(--t3)}

@media(max-width:800px){
  main{grid-template-columns:1fr;display:block}
  .sidebar{position:static;max-height:none;border-right:none;border-bottom:0.5px solid var(--border);padding:12px}
  .steps-nav{flex-direction:row;flex-wrap:wrap;gap:3px}
  .form-area{padding:14px}
  .service-grid,.daw-grid,.check-grid2{grid-template-columns:1fr}
  header,footer,.hero,.progress-wrap{padding-left:14px;padding-right:14px}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark" id="logoMark">
      <svg viewBox="0 0 16 16" fill="none"><path d="M2 8h3l2-5 3 10 2-5h2" stroke="#000" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span class="logo-text">BounceGuide</span>
  </div>
  <div style="display:flex;align-items:center;gap:20px">
    <a href="/about" class="about-nav-link">About</a>
    <div class="header-sep"></div>
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('it')">IT</button>
      <button class="lang-btn" onclick="setLang('es')">ES</button>
      <button class="lang-btn" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" onclick="setLang('de')">DE</button>
      <button class="lang-btn" onclick="setLang('pt')">PT</button>
    </div>
  </div>
</header>

<div class="hero">
  <div class="hero-tag" data-t="heroTag"></div>
  <h1 data-t="heroTitle"></h1>
  <p class="hero-desc" data-t="heroDesc"></p>
  <div class="hero-features">
    <span class="hero-feat" data-t="hf1"></span>
    <span class="hero-feat" data-t="hf2"></span>
    <span class="hero-feat" data-t="hf3"></span>
    <span class="hero-feat" data-t="hf4"></span>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-label"><span data-t="progressLabel"></span><span id="progressPct">0%</span></div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
</div>

<main>
<div class="sidebar">
  <div class="tone-label" data-t="toneLabel"></div>
  <div class="tone-btns">
    <button class="tone-btn active" onclick="setTone('formal')" data-t="toneFormal"></button>
    <button class="tone-btn" onclick="setTone('informal')" data-t="toneInformal"></button>
  </div>
  <div class="sidebar-sep"></div>
  <div class="steps-nav" id="stepsNav"></div>
  <div class="sidebar-sep"></div>
  <button class="gen-btn" id="generateBtn" onclick="generatePDF()" disabled data-t="generateBtn"></button>
  <button class="reset-btn" onclick="resetAll()" data-t="resetBtn"></button>
</div>

<div class="form-area">

<!-- S1: Branding -->
<div class="form-section active" id="step-1">
  <div class="section-title" data-t="s1title"></div>
  <div class="section-desc" data-t="s1desc"></div>
  <div class="field-group"><label class="field-label" data-t="s1name"></label><input type="text" id="mixerName" data-t-ph="s1namePh" oninput="autoSave()"></div>
  <div class="field-group"><label class="field-label" data-t="s1email"></label><input type="email" id="mixerEmail" data-t-ph="s1emailPh" oninput="autoSave()"></div>
  <div class="field-group"><label class="field-label" data-t="s1web"></label><input type="url" id="mixerWeb" data-t-ph="s1webPh" oninput="autoSave()"></div>
  <div class="field-group"><label class="field-label" data-t="s1phone"></label><input type="text" id="mixerPhone" data-t-ph="s1phonePh" oninput="autoSave()"></div>
  <div class="field-group">
    <label class="field-label" data-t="s1logo"></label>
    <div class="logo-upload" onclick="document.getElementById('logoInput').click()">
      <div style="font-size:11px;color:var(--t2)" data-t="s1logoHint"></div>
      <img id="logoPreview" class="logo-preview" style="display:none">
    </div>
    <input type="file" id="logoInput" accept="image/png,image/jpeg" style="display:none" onchange="handleLogo(this)">
  </div>
  <div class="field-group">

function t(k){return T[lang]?.[k]??T.en?.[k]??k;}
function tArr(k){return T[lang]?.[k]??T.en?.[k]??[];}
function checkSVG(){return`<svg viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}

// Luminance helper for PDF text color
function luminance(r,g,b){return 0.299*r+0.587*g+0.114*b;}
function textOnBg(r,g,b){return luminance(r,g,b)<128?[255,255,255]:[15,15,15];}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));
  document.documentElement.lang=l;
  applyT();buildAll();
}

function applyT(){
  document.querySelectorAll('[data-t]').forEach(el=>el.innerHTML=t(el.getAttribute('data-t')));
  document.querySelectorAll('[data-t-ph]').forEach(el=>el.placeholder=t(el.getAttribute('data-t-ph')));
  buildStepsNav();
}

function updateAccent(v){
  fd.accentColor=v;
  document.querySelector(':root').style.setProperty('--acc',v);
  document.getElementById('logoMark').style.background=v;
  const r=parseInt(v.slice(1,3),16),g=parseInt(v.slice(3,5),16),b=parseInt(v.slice(5,7),16);
  document.querySelector(':root').style.setProperty('--acc-dim',`rgba(${r},${g},${b},0.12)`);
}

function setTone(t2){
  tone=t2;
  document.querySelectorAll('.tone-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.tone-btn[onclick="setTone('${t2}')"]`)?.classList.add('active');
}

function handleLogo(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{fd.logoBase64=e.target.result;const p=document.getElementById('logoPreview');p.src=e.target.result;p.style.display='block';};
  reader.readAsDataURL(file);
}

function autoSave(){
  updateProgress();
  try{localStorage.setItem('bg_v5',JSON.stringify({accentColor:fd.accentColor,mixerName:document.getElementById('mixerName')?.value||''}));}catch(e){}
}

function updateProgress(){
  const pct=Math.round((completedSteps.size/TOTAL)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';
}

function resetAll(){
  const msg=lang==='it'?'Ricominciare da capo? Tutti i dati verranno cancellati.':'Start over? All data will be lost.';
  if(!confirm(msg))return;
  try{localStorage.removeItem('bg_v5');}catch(e){}
  location.reload();
}

const stepLabels={en:['Details','Service','Glossary','Format','Stems','Naming','Delivery','DAW Guides','Checklist'],it:['Dati','Servizio','Glossario','Formato','Stem','Nomenclatura','Invio','Guide DAW','Checklist'],es:['Datos','Servicio','Glosario','Formato','Stems','Nomenclatura','Envio','DAW','Checklist'],fr:['Donnees','Service','Glossaire','Format','Stems','Nommage','Envoi','DAW','Checklist'],de:['Daten','Service','Glossar','Format','Stems','Benennung','Senden','DAW','Checkliste'],pt:['Dados','Servico','Glossario','Formato','Stems','Nomenclatura','Envio','DAW','Checklist']};

function buildStepsNav(){
  const nav=document.getElementById('stepsNav');
  const labels=stepLabels[lang]||stepLabels.en;
  nav.innerHTML=labels.map((lb,i)=>{
    const n=i+1,done=completedSteps.has(n)||n<currentStep,active=n===currentStep;
    return`<button class="step-btn${done?' done':''}${active?' active':''}" onclick="goStep(${n})"><span class="step-num">${done?'v':n}</span>${lb}</button>`;
  }).join('');
}

function goStep(n){
  if(n<1||n>TOTAL)return;
  document.querySelectorAll('.form-section').forEach(s=>s.classList.remove('active'));
  document.getElementById(`step-${n}`).classList.add('active');
  currentStep=n;buildStepsNav();
  window.scrollTo({top:0,behavior:'smooth'});
}

function advance(fromStep){
  completedSteps.add(fromStep);updateProgress();goStep(fromStep+1);
}

function finishForm(){
  completedSteps.add(9);updateProgress();
  document.getElementById('generateBtn').disabled=false;
  buildChecklist();
}

function toggleArr(key,idx,otherRevealId,isOther,rebuild){
  const arr=fd[key],pos=arr.indexOf(idx);
  if(pos>-1)arr.splice(pos,1);else arr.push(idx);
  if(rebuild)rebuildKey(key);
  if(otherRevealId&&isOther){const rev=document.getElementById(otherRevealId);if(rev)rev.classList.toggle('visible',arr.includes(idx));}
  buildChecklist();autoSave();
}

function rebuildKey(key){
  const map={glossary:['glossaryItems','glossaryTerms','glossary',null,false],drums:['drumsChecks','drumsOptions','drums',null,false],instr:['instrChecks','instrOptions','instr',null,false],vocals:['vocalChecks','vocalOptions','vocals',null,false],premix:['premixChecks','premixOptions','premix',null,false],vocalsTB:['vocalChecksTB','vocalOptions','vocalsTB',null,false],premixTB:['premixChecksTB','premixOptions','premixTB',null,false],naming:['namingChecks','namingOptions','naming',null,false],delivery:['deliveryChecks','deliveryOptions','delivery','deliveryOtherReveal',true],session:['sessionChecks','sessionOptions','session','sessionOtherReveal',true],stupid:['stupidChecks','stupidItems','stupid',null,false]};
  const args=map[key];if(!args)return;
  if(key==='glossary'){buildGlossaryItems();return;}
  buildCheckListFromKey(...args);
}

function buildCheckListFromKey(containerId,optKey,stateKey,otherRevealId,hasOther){

  const opts=tArr(optKey);
  el.innerHTML=opts.map((opt,i)=>`
    <div class="check-item${fd[stateKey].includes(i)?' checked':''}" onclick="toggleArr('${stateKey}',${i},'${otherRevealId||''}',${opt.isOther||false},true)">
      <div class="check-box">${checkSVG()}</div>
      <div><div class="check-label">${opt.label}</div>${opt.sub?`<div class="check-sub">${(fd.wetPhilEnabled&&opt.isWet)?t('s5wetUiGeneric'):opt.sub}</div>`:''}</div>

}

function toggleDAW(id){
  const pos=fd.daws.indexOf(id);
  if(pos>-1){
    fd.daws.splice(pos,1);
    delete fd.dawConfirmed[id];
    delete fd.dawCustomSteps[id];
  } else {
    fd.daws.push(id);
  }
  buildDAWGrid();autoSave();
}

function buildDAWConfirmSection(){
  const wrap=document.getElementById('dawConfirmSection');
  if(!wrap)return;
  if(!fd.daws.length){wrap.innerHTML='';updateContinue8();return;}

  const steps=DAW_STEPS[lang]||DAW_STEPS.en;
  wrap.innerHTML=fd.daws.map(id=>{
    const d=DAWS.find(x=>x.id===id);
    const dawSteps=(steps[id]||DAW_STEPS.en[id]||[]).filter(s=>s);
    const confirmed=fd.dawConfirmed[id];
    const isNo=confirmed===false;
    const isYes=confirmed===true;

    const stepsHTML=dawSteps.map((s,i)=>`<div class="daw-step-row"><span class="daw-step-num">${i+1}</span>${s}</div>`).join('');

    return `<div class="daw-confirm-card">
      <div class="daw-confirm-header">
        <div class="daw-confirm-header-left">${d.icon} ${d.name}</div>
        ${isYes?`<div class="daw-confirmed-badge">&#10003; ${t('s8confirmedLabel')}</div>`:''}
      </div>
      <div class="daw-steps-preview">${stepsHTML}</div>
      <div class="daw-yt-section">
        <div class="daw-yt-label">${t('s8ytLabel')}</div>
        <input type="url" placeholder="https://youtube.com/watch?v=..." value="${fd.dawYT[id]||''}" oninput="fd.dawYT['${id}']=this.value;autoSave()">
      </div>
      <div class="daw-confirm-question">
        <span class="daw-confirm-q-text">${t('s8confirmQ')}</span>
        <div class="daw-confirm-btns">
          <button class="daw-yes-btn${isYes?' active':''}" onclick="confirmDAW('${id}',true)">${t('s8yesBtn')}</button>
          <button class="daw-no-btn${isNo?' active':''}" onclick="confirmDAW('${id}',false)">${t('s8noBtn')}</button>
        </div>
      </div>
      ${isNo?`<div class="daw-edit-area">
        <div style="font-size:11px;color:var(--t2);margin-bottom:6px">${t('s8editLabel')}</div>
        <textarea rows="9" oninput="fd.dawCustomSteps['${id}']=this.value;autoSave()">${fd.dawCustomSteps[id]||dawSteps.join('\n')}</textarea>
        <button class="daw-edit-confirm-btn" onclick="finalizeDAWEdit('${id}')">${t('s8confirmEditsBtn')}</button>
      </div>`:''}
    </div>`;
  }).join('');

  updateContinue8();
}

function confirmDAW(id,yes){
  fd.dawConfirmed[id]=yes;
  if(!yes&&!fd.dawCustomSteps[id]){
    const steps=DAW_STEPS[lang]||DAW_STEPS.en;
    fd.dawCustomSteps[id]=(steps[id]||DAW_STEPS.en[id]||[]).filter(s=>s).join('\n');
  }
  buildDAWConfirmSection();autoSave();
}

function finalizeDAWEdit(id){
  fd.dawConfirmed[id]=true;
  buildDAWConfirmSection();autoSave();
}

function updateContinue8(){
  const btn=document.getElementById('advance8Btn');
  const note=document.getElementById('daw8LockedNote');
  if(!btn)return;
  const allConfirmed=fd.daws.length===0||fd.daws.every(id=>fd.dawConfirmed[id]===true);
  btn.disabled=!allConfirmed;
  if(note)note.style.display=(!allConfirmed&&fd.daws.length>0)?'block':'none';
}

// ═══════════════════════════════════════════
//  PDF GENERATION
// ═══════════════════════════════════════════
function generatePDF(){
  if(!window.jspdf){setTimeout(generatePDF,500);return;}
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF('p','mm','a4');
  const W=210,H=297,M=18,CW=W-M*2;
  let y=M;
  const tl=T[lang]||T.en;
  const hex=fd.accentColor;
  const AR=parseInt(hex.slice(1,3),16),AG=parseInt(hex.slice(3,5),16),AB=parseInt(hex.slice(5,7),16);
  const ACC=[AR,AG,AB];
  const DARK=[15,15,15];
  const MID=[90,90,90];
  const LIGHT=[242,242,242];
  const accTextColor=textOnBg(AR,AG,AB);

  const phil=document.getElementById('wetdryPhil')?.value?.trim()||'';
  const hasPhil=fd.wetPhilEnabled&&phil.length>0;
  const genericSub=tl.pdf_stem_sub_generic;

  function np(){doc.addPage();y=M;}
  function ck(need){if(y+need>H-16)np();}

  function secH(label,bgColor=ACC,minContent=28){
    if(y+12+minContent>H-16)np();
    else if(y>M+5)y+=4;
    doc.setFillColor(...bgColor);
    doc.rect(M,y,CW,7,'F');
    const tc=textOnBg(bgColor[0],bgColor[1],bgColor[2]);
    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(...tc);
    doc.text(label,M+4,y+5);
    y+=11;doc.setTextColor(40,40,40);
  }

  function bodyTxt(text,indent=0,color=[40,40,40],size=10){
    if(!text?.trim())return;
    doc.setFontSize(size);doc.setFont('helvetica','normal');doc.setTextColor(...color);
    const lines=doc.splitTextToSize(text,Math.max(CW-indent-4,60));
    lines.forEach(l=>{ck(6);doc.text(l,M+indent,y);y+=5.5;});
  }

  function bullet(text,n=null,indent=5){
    if(!text?.trim())return;
    ck(7);
    doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);
    const pre=n!=null?`${n}.  `:'- ';
    const lines=doc.splitTextToSize(pre+text,Math.max(CW-indent-8,60));
    lines.forEach((l,i)=>{ck(6);doc.text(l,M+indent+(i>0?6:0),y);y+=5.5;});
  }

  function subBullet(text,indent=12){
    if(!text?.trim())return;
    ck(6);
    doc.setFontSize(9);doc.setFont('helvetica','italic');doc.setTextColor(100,100,100);
    const lines=doc.splitTextToSize(text,CW-indent-4);
    lines.forEach(l=>{ck(5);doc.text(l,M+indent,y);y+=5;});
    doc.setTextColor(40,40,40);
  }

  function infoBox(label,value){
    ck(11);
    doc.setFillColor(...LIGHT);doc.rect(M,y,CW,9,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...MID);
    doc.text(label.toUpperCase()+':',M+4,y+6);
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...DARK);
    doc.text(value,M+40,y+6);
    y+=13;
  }

  function warnBox(text){
    if(!text?.trim())return;
    ck(18);
    const lines=doc.splitTextToSize(text,CW-12);
    // tight padding: top 6px, bottom 6px, line height 5.5
    const bh=Math.max(lines.length*5+4,9);
    doc.setFillColor(255,240,240);doc.rect(M,y,CW,bh,'F');
    doc.setFillColor(190,40,40);doc.rect(M,y,3,bh,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(140,20,20);
    let iy=y+4.5;
    lines.forEach(l=>{doc.text(l,M+7,iy);iy+=5;});
    y+=bh+2;
  }

  function infoExplain(text){
    if(!text?.trim())return;
    ck(14);
    const lines=doc.splitTextToSize(text,CW-12);
    const bh=Math.max(lines.length*5+4,9);
    doc.setFillColor(235,245,255);doc.rect(M,y,CW,bh,'F');
    doc.setFillColor(100,150,220);doc.rect(M,y,3,bh,'F');
    doc.setFont('helvetica','italic');doc.setFontSize(9.5);doc.setTextColor(40,70,130);
    let iy=y+4.5;
    lines.forEach(l=>{doc.text(l,M+7,iy);iy+=5;});
    y+=bh+2;
  }

  // ── COVER ──
  doc.setFillColor(...DARK);doc.rect(0,0,W,36,'F');
  doc.setFillColor(...ACC);doc.rect(0,36,W,3,'F');
  if(fd.logoBase64){try{doc.addImage(fd.logoBase64,'PNG',M,5,0,24);}catch(e){}}
  const titleX=fd.logoBase64?M+85:M;
  doc.setFont('helvetica','bold');doc.setFontSize(17);doc.setTextColor(255,255,255);
  doc.text(tl.pdf_title,titleX,19);
  const sub=tone==='formal'?tl.pdf_sub_formal:tl.pdf_sub_informal;
  doc.setFont('helvetica','normal');doc.setFontSize(9.5);doc.setTextColor(155,155,155);
  const subLines=doc.splitTextToSize(sub,CW-(fd.logoBase64?82:0));
  subLines.forEach((l,i)=>doc.text(l,titleX,28+i*5));
  y=48;

  const mixerName=document.getElementById('mixerName')?.value||'';
  const mixerEmail=document.getElementById('mixerEmail')?.value||'';
  const mixerWeb=document.getElementById('mixerWeb')?.value||'';
  const mixerPhone=document.getElementById('mixerPhone')?.value||'';
  if(mixerName){doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(...DARK);doc.text(mixerName,M,y);y+=7;}
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(...MID);
  if(mixerEmail){doc.text(`${tl.pdf_contact}: ${mixerEmail}`,M,y);y+=5;}
  if(mixerWeb){doc.text(`${tl.pdf_web}: ${mixerWeb}`,M,y);y+=5;}
  if(mixerPhone){doc.text(`${tl.pdf_phone}: ${mixerPhone}`,M,y);y+=5;}

  const svcLabel=fd.serviceType==='mix'?tl.pdf_service_mix:tl.pdf_service_master;
  doc.setFillColor(...ACC);doc.roundedRect(M,y+4,55,8,2,2,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...textOnBg(AR,AG,AB));
  doc.text(svcLabel,M+3,y+9.5);y+=20;

  const msg=document.getElementById('mixerMsg')?.value||'';
  if(msg){
    ck(18);
    const mlines=doc.splitTextToSize(msg,CW-9);
    const bh=Math.max(mlines.length*5.5+10,14);
    doc.setFillColor(248,252,245);doc.rect(M,y,CW,bh,'F');
    doc.setFillColor(...ACC);doc.rect(M,y,2.5,bh,'F');
    doc.setFont('helvetica','italic');doc.setFontSize(10);doc.setTextColor(50,70,50);
    let iy=y+7;mlines.forEach(l=>{doc.text(l,M+6,iy);iy+=5.5;});
    y+=bh+6;
  }

  // ── GLOSSARY ──
  if(fd.glossaryEnabled&&(fd.glossary.length||fd.glossaryOthers.length)){
    secH(tl.pdf_glossary,[60,60,60]);
    const terms=tArr('glossaryTerms');
    fd.glossary.forEach(i=>{
      const term=terms[i];if(!term)return;
      ck(16);
      doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...DARK);
      doc.text(term.term+':',M+3,y);y+=5.5;
      bodyTxt(term.def,6,[70,70,70],9.5);y+=2;
    });
    fd.glossaryOthers.filter(g=>g.term).forEach(g=>{
      ck(14);
      doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...DARK);
      doc.text(g.term+':',M+3,y);y+=5.5;
      if(g.def)bodyTxt(g.def,6,[70,70,70],9.5);y+=2;
    });
  }

  // ── FORMAT ──
  secH(tl.pdf_sec_format);
  const fmtVal=fd.format==='other'?(document.getElementById('formatOtherText')?.value||'Custom'):fd.format;
  if(fmtVal)infoBox(tl.pdf_format_label,fmtVal);
  if(fd.sr)infoBox(tl.pdf_sr_label,fd.sr);
  if(fd.bd)infoBox(tl.pdf_bd_label,fd.bd);

  // ── WET/DRY PHILOSOPHY ──
  warnBox(tl.pdf_master_warn);
  infoExplain(tl.pdf_wetdry_note);
  if(hasPhil){
    secH(tl.pdf_sec_philos);
    bodyTxt(phil,0,[40,40,40]);y+=4;
  }

  // ── STEMS ──
  const renderStemGroup=(optKey,stateKey,groupTitle)=>{
    const opts=tArr(optKey);
    const sel=fd[stateKey].map(i=>opts[i]).filter(Boolean);
    if(!sel.length)return;
    ck(14);
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(AR,AG,AB);
    doc.text('-- '+groupTitle+' --',M+3,y);y+=7;doc.setTextColor(40,40,40);
    sel.forEach(s=>{
      // Calculate combined height of label + sub before drawing anything
      const subText=(hasPhil&&s.isWet)?genericSub:s.sub;
      const labelLines=doc.splitTextToSize('- '+s.label,Math.max(CW-5-8,60));
      const subLines=subText?doc.splitTextToSize(subText,CW-12-4):[];
      const totalH=labelLines.length*5.5+(subLines.length*5)+2;
      ck(totalH); // ensure whole item fits before starting
      bullet(s.label);
      if(subText)subBullet(subText);
    });
    y+=2;
  };

  secH(tl.pdf_sec_stems);
  if(fd.serviceType==='mix'&&fd.trackType==='stems'){
    renderStemGroup('drumsOptions','drums',t('s5drumsLabel'));
    renderStemGroup('instrOptions','instr',t('s5instrLabel'));
    renderStemGroup('vocalOptions','vocals',t('s5vocalLabel'));
    renderStemGroup('premixOptions','premix',t('s5premixLabel'));
  } else if(fd.serviceType==='mix'&&fd.trackType==='typebeat'){
    renderStemGroup('vocalOptions','vocalsTB',t('s5vocalLabel'));
    renderStemGroup('premixOptions','premixTB',t('s5premixLabel'));
  } else {
    renderStemGroup('premixOptions','premix',t('s5premixLabel'));
  }
  fd.stemOthers.filter(s=>s.title).forEach(s=>{
    ck(14);
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(AR,AG,AB);
    doc.text('-- '+s.title+' --',M+3,y);y+=7;doc.setTextColor(40,40,40);
    if(s.desc)bodyTxt(s.desc,4,[60,60,60]);y+=2;
  });

  // ── NAMING ──
  const namOpts=tArr('namingOptions');
  const selNam=fd.naming.filter(i=>!namOpts[i]?.isOther).map(i=>namOpts[i]).filter(Boolean);
  const namExample=document.getElementById('namingExample')?.value||'';
  if(selNam.length||namExample||fd.namingOthers.length){
    secH(tl.pdf_sec_naming);
    if(namExample){
      ck(14);
      doc.setFillColor(...DARK);doc.rect(M,y,CW,10,'F');
      doc.setFont('courier','bold');doc.setFontSize(11);doc.setTextColor(AR,AG,AB);
      doc.text(`${tl.pdf_sec_example}: ${namExample}.wav`,M+5,y+7);y+=14;
    }
    selNam.forEach(s=>{
      const nl=doc.splitTextToSize('- '+s.label,Math.max(CW-5-8,60));
      const ns=s.sub?doc.splitTextToSize(s.sub,CW-12-4):[];
      ck(nl.length*5.5+ns.length*5+2);
      bullet(s.label);if(s.sub)subBullet(s.sub);
    });
    fd.namingOthers.filter(n=>n.title).forEach(n=>{
      const nl=doc.splitTextToSize('- '+n.title,Math.max(CW-5-8,60));
      const ns=n.desc?doc.splitTextToSize(n.desc,CW-12-4):[];
      ck(nl.length*5.5+ns.length*5+2);
      bullet(n.title);if(n.desc)subBullet(n.desc);
    });
    y+=2;
  }

  // ── DELIVERY ──
  const delOpts=tArr('deliveryOptions');
  const selDel=fd.delivery.filter(i=>!delOpts[i]?.isOther).map(i=>delOpts[i]).filter(Boolean);
  const delOther=document.getElementById('deliveryOtherText')?.value||'';
  const customLink=document.getElementById('customLink')?.value||'';
  const delivEmail=document.getElementById('deliveryEmail')?.value||'';
  if(selDel.length||delOther){
    secH(tl.pdf_sec_delivery);
    selDel.forEach(s=>{
      const dl=doc.splitTextToSize('- '+s.label,CW-6);
      const ds=s.sub?doc.splitTextToSize('  '+s.sub,CW-8):[];
      ck(dl.length*5.5+ds.length*5.5+2);
      doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...DARK);doc.text(`- ${s.label}`,M+3,y);y+=5.5;
      if(s.sub){doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(...MID);doc.text(`  ${s.sub}`,M+5,y);y+=5.5;}
    });
    if(delOther)bullet(delOther);
    if(customLink){ck(12);y+=2;doc.setFillColor(...DARK);doc.rect(M,y,CW,9,'F');doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(AR,AG,AB);doc.text(`Link: ${customLink}`,M+4,y+6);y+=13;}
    if(delivEmail){ck(10);doc.setFillColor(...LIGHT);doc.rect(M,y,CW,9,'F');doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(...MID);doc.text(`${tl.pdf_deliv_email_label}: `,M+4,y+6);doc.setFont('helvetica','bold');doc.setTextColor(...DARK);doc.text(delivEmail,M+4+doc.getTextWidth(`${tl.pdf_deliv_email_label}: `),y+6);y+=13;}
  }

  // ── SESSION ──
  const sessOpts=tArr('sessionOptions');
  const selSess=fd.session.filter(i=>!sessOpts[i]?.isOther).map(i=>sessOpts[i]).filter(Boolean);
  const sessOther=document.getElementById('sessionOtherText')?.value||'';
  if(selSess.length||sessOther){
    secH(tl.pdf_sec_session);
    selSess.forEach(s=>bullet(s.label));
    if(sessOther)bullet(sessOther);y+=2;
  }

  // ── DAW GUIDES ──
  const selDAWs=DAWS.filter(d=>fd.daws.includes(d.id));
  selDAWs.forEach(daw=>{
    // Use custom steps if confirmed with edits, else use standard steps
    const stdSteps=(DAW_STEPS[lang]||DAW_STEPS.en)[daw.id]||DAW_STEPS.en[daw.id]||[];
    const dawStepList=fd.dawCustomSteps[daw.id]?fd.dawCustomSteps[daw.id].split('\n').filter(s=>s.trim()):stdSteps.filter(s=>s);
    const estH=14+(dawStepList.length*11);
    if(y+Math.min(estH,55)>H-16)np();
    secH(`${tl.pdf_sec_daw} -- ${daw.name}`,DARK);
    dawStepList.forEach((step,i)=>bullet(step,i+1));
    y+=3;
    const ytUrl=fd.dawYT[daw.id]||'';
    if(ytUrl){ck(11);doc.setFillColor(...DARK);doc.rect(M,y,CW,9,'F');doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(AR,AG,AB);doc.text(`${tl.pdf_daw_yt}: ${ytUrl}`,M+4,y+6);y+=13;}
  });

  fd.dawOthers.filter(d=>d.name).forEach(d=>{
    if(y+40>H-16)np();
    secH(`${tl.pdf_sec_daw} -- ${d.name}`,DARK);
    if(d.steps){d.steps.split('\n').filter(s=>s.trim()).forEach((step,i)=>bullet(step,i+1));}
    if(d.yt){ck(11);doc.setFillColor(...DARK);doc.rect(M,y,CW,9,'F');doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(AR,AG,AB);doc.text(`${tl.pdf_daw_yt}: ${d.yt}`,M+4,y+6);y+=13;}
    y+=3;
  });

  // ── STUPIDITY CHECK ──
  const stupidItems=tArr('stupidItems');
  const allStupid=[...fd.stupid.map(i=>stupidItems[i]).filter(Boolean),...fd.stupidOthers.filter(s=>s.label)];
  if(allStupid.length){
    if(y+40>H-16)np();
    secH(tl.pdf_sec_stupid,[170,25,25]);
    allStupid.forEach(s=>{
      const labelLines=doc.splitTextToSize(s.label,CW-14);
      const subLines=s.sub?doc.splitTextToSize(s.sub,CW-17):[];
      const bh=Math.max(labelLines.length*5+subLines.length*4.5+5,9);
      ck(bh+2);
      doc.setFillColor(255,243,243);doc.rect(M,y,CW,bh,'F');
      doc.setFillColor(180,35,35);doc.rect(M,y,3,bh,'F');
      let iy=y+4.5;
      doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(140,20,20);
      labelLines.forEach(l=>{doc.text(l,M+7,iy);iy+=5;});
      if(subLines.length){doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(110,40,40);subLines.forEach(l=>{doc.text(l,M+9,iy);iy+=4.5;});}
      y+=bh+3;
    });
  }

  // ── CHECKLIST ──
  const base=tArr('checklistBase');
  const fmtItem=fmtVal?`${tl.pdf_format_label}: ${fmtVal}${fd.sr?' - '+fd.sr:''}${fd.bd?' - '+fd.bd:''}`:null;
  const allCl=fmtItem?[fmtItem,...base]:base;
  if(y+40>H-16)np();
  secH(tl.pdf_sec_checklist);
  ck(7);doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(60,60,60);
  doc.text(tl.pdf_checklist_intro,M,y);y+=8;
  allCl.forEach(item=>{
    const clLines=doc.splitTextToSize(item,CW-16);
    const rowH=Math.max(clLines.length*5.5+6,10);
    ck(rowH+3);
    doc.setFillColor(245,245,245);doc.rect(M,y,CW,rowH,'F');
    doc.setDrawColor(150,150,150);doc.setLineWidth(0.4);
    doc.rect(M+3,y+(rowH-5)/2,5,5,'S');
    doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(...DARK);
    const textY=clLines.length===1?y+(rowH/2)+3:y+7;
    clLines.forEach((l,i)=>{doc.text(l,M+12,textY+i*5.5);});
    y+=rowH+3;
  });

  // ── NOTES ──
  const notes=document.getElementById('extraNotes')?.value||'';
  const refYT=document.getElementById('refYT')?.value||'';
  if(notes){secH(tl.pdf_sec_notes);bodyTxt(notes);y+=3;}
  if(refYT){secH(tl.pdf_sec_yt);ck(11);doc.setFillColor(...DARK);doc.rect(M,y,CW,9,'F');doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(AR,AG,AB);doc.text(refYT,M+4,y+6);y+=13;}

  // ── CONTACT BOX ──
  const contactNote=document.getElementById('contactNote')?.value||'';
  if(contactNote){
    ck(22);y+=4;
    const cnLines=doc.splitTextToSize(contactNote,CW-14);
    const bh=Math.max(cnLines.length*5.5+12,18);
    doc.setFillColor(...DARK);doc.rect(M,y,CW,bh,'F');
    doc.setFillColor(AR,AG,AB);doc.rect(M,y,CW,3,'F');
    doc.setFont('helvetica','italic');doc.setFontSize(10);doc.setTextColor(210,210,210);
    let iy=y+10;
    cnLines.forEach(l=>{doc.text(l,M+6,iy);iy+=5.5;});
    y+=bh+4;
  }

  // ── T&C ──
  if(fd.tc){const tc=document.getElementById('tcText')?.value||'';if(tc){secH(tl.pdf_sec_tc);bodyTxt(tc);}}

  // ── FOOTER ──
  const pages=doc.getNumberOfPages();
  for(let p=1;p<=pages;p++){
    doc.setPage(p);
    doc.setFillColor(...DARK);doc.rect(0,H-10,W,10,'F');
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(100,100,100);
    doc.text(tl.pdf_footer,M,H-4);
    doc.text(`${p} / ${pages}`,W-M,H-4,{align:'right'});
  }

  const name=(document.getElementById('mixerName')?.value||'guide').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_-]/g,'');
  doc.save(`BounceGuide_${name||'guide'}.pdf`);
}

// ═══════════════════════════════════════════
//  BUILD ALL
// ═══════════════════════════════════════════
function buildAll(){
  buildGlossaryItems();buildGlossaryOtherList();
  buildCheckListFromKey('drumsChecks','drumsOptions','drums',null,false);
  buildCheckListFromKey('instrChecks','instrOptions','instr',null,false);
  buildCheckListFromKey('vocalChecks','vocalOptions','vocals',null,false);
  buildCheckListFromKey('premixChecks','premixOptions','premix',null,false);
  buildCheckListFromKey('vocalChecksTB','vocalOptions','vocalsTB',null,false);
  buildCheckListFromKey('premixChecksTB','premixOptions','premixTB',null,false);
  buildCheckListFromKey('namingChecks','namingOptions','naming',null,false);
  buildCheckListFromKey('deliveryChecks','deliveryOptions','delivery','deliveryOtherReveal',true);
  buildCheckListFromKey('sessionChecks','sessionOptions','session','sessionOtherReveal',true);
  buildStupidChecks();buildStupidOtherList();
  buildDAWGrid();
  buildStemOtherList();buildNamingOtherList();buildDAWOtherList();
  buildChecklist();updateContinue8();
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  try{
    const saved=localStorage.getItem('bg_v5');
    if(saved){
      const p=JSON.parse(saved);
      if(p.mixerName)document.getElementById('mixerName').value=p.mixerName;
      if(p.accentColor){fd.accentColor=p.accentColor;updateAccent(p.accentColor);document.getElementById('accentColor').value=p.accentColor;}
    }
  }catch(e){}
  applyT();buildAll();
});
</script>
