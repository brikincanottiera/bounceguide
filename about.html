<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--bg2:#181818;--bg3:#222;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--t1:#efefef;--t2:#888;--t3:#444;--acc:#E8C547;--acc-dim:rgba(232,197,71,0.12);--radius:10px;--radius-sm:6px}
html{background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.6}
body{min-height:100vh;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(15,15,15,0.96);backdrop-filter:blur(16px)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:28px;height:28px;border-radius:6px;background:var(--acc);display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:16px;height:16px}
.logo-text{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-0.4px}
.lang-switcher{display:flex;gap:4px}
.lang-btn{padding:4px 9px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:transparent;color:var(--t2);font-size:11px;cursor:pointer;transition:all 0.15s;font-weight:500;text-transform:uppercase}
.lang-btn:hover{border-color:var(--border2);color:var(--t1)}
.lang-btn.active{background:var(--acc-dim);border-color:var(--acc);color:var(--acc)}
main{flex:1;max-width:780px;margin:0 auto;padding:48px 24px 80px;width:100%}
.about-hero{display:flex;gap:40px;align-items:flex-start;margin-bottom:48px}
.about-photo{width:160px;height:160px;border-radius:50%;object-fit:cover;border:3px solid var(--acc);display:block;flex-shrink:0}
.about-hero-text{flex:1;min-width:0}
.about-tag{font-size:11px;font-weight:700;color:var(--acc);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.about-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--acc)}
.about-name{font-size:28px;font-weight:800;color:var(--t1);letter-spacing:-0.6px;line-height:1.2;margin-bottom:4px}
.about-handle{font-size:14px;color:var(--acc);font-weight:600;margin-bottom:14px}
.about-bio{font-size:14px;color:var(--t2);line-height:1.75}
.links-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.link-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg2);color:var(--t2);font-size:12px;font-weight:600;text-decoration:none;transition:all 0.15s}
.link-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.link-btn svg{width:14px;height:14px;flex-shrink:0}
.section-divider{height:0.5px;background:var(--border);margin:40px 0}
.why-title{font-size:20px;font-weight:800;color:var(--t1);letter-spacing:-0.4px;margin-bottom:6px}
.why-subtitle{font-size:13px;color:var(--t3);margin-bottom:24px}
.meme-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:20px 24px;margin-bottom:14px;position:relative}
.meme-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--acc);border-radius:3px 0 0 3px}
.meme-number{font-size:10px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.meme-text{font-size:14px;color:var(--t1);line-height:1.7}
.conclusion-box{background:var(--acc-dim);border:0.5px solid var(--acc);border-radius:var(--radius);padding:20px 24px;margin-top:20px}
.conclusion-text{font-size:14px;color:var(--t1);line-height:1.7}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--t2);text-decoration:none;margin-bottom:32px;transition:color 0.15s}
.back-link:hover{color:var(--acc)}
.kofi-wrap{margin-top:20px;display:flex;justify-content:center}
.kofi-btn{display:flex;align-items:center;gap:14px;padding:16px 24px;border-radius:var(--radius);border:0.5px solid rgba(255,94,91,0.3);background:rgba(255,94,91,0.06);text-decoration:none;transition:all 0.2s;max-width:420px;width:100%}
.kofi-btn:hover{border-color:rgba(255,94,91,0.6);background:rgba(255,94,91,0.12);transform:translateY(-1px)}
.kofi-emoji{font-size:32px;flex-shrink:0}
.kofi-title{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:3px}
.kofi-sub{font-size:12px;color:var(--t2);line-height:1.5}
footer{padding:20px 32px;border-top:0.5px solid var(--border);background:var(--bg)}
.footer-inner{max-width:780px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
.footer-left{font-size:12px;color:var(--t2)}
.footer-links{display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.footer-links a{font-size:12px;font-weight:600;color:var(--t2);text-decoration:none;transition:color 0.15s}
.footer-links a:hover{color:var(--acc)}
.footer-links .legal{font-weight:400;color:var(--t3)}
.footer-links .legal:hover{color:var(--t2)}
@media(max-width:640px){.lang-switcher{display:none !important}.lang-select-mobile{display:block !important}}
@media(min-width:641px){.lang-select-mobile{display:none !important}}
@media(max-width:600px){
  .about-hero{flex-direction:column;align-items:center;text-align:center;gap:24px}
  .about-tag{justify-content:center}
  header{padding:12px 16px}
  main{padding:28px 16px 60px}
  .about-name{font-size:22px}
  .links-row{justify-content:center}
  footer{padding:14px 16px}
}
</style>
</head>
